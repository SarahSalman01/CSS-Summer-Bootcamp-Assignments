<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Summer Bootcamp Assignments</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #0f3d91;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        a {
            display: block;
            margin: 15px 0;
            padding: 15px;
            background: #0f3d91;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: .3s;
        }

        a:hover {
            background: #1f6de0;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>CSS Summer Bootcamp Assignments</h1>

        <p>Select an assignment to view.</p>

        <a href="week2-CSS-Portfolio/">
            Week 2 - Personal Portfolio
        </a>

        <a href="week2-css-landing-page/">
            Week 2 - CSS Landing Page
        </a>

    </div>

</body>

</html>
